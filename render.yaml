services:
  - type: web
    name: ecogrow
    env: java
    plan: free
    buildCommand: mvn clean package -DskipTests
    startCommand: java -jar target/ecogrow-0.0.1-SNAPSHOT.jar
    envVars:
      - key: PORT
        value: 8080
      - key: DATABASE_URL
        fromDatabase:
          name: ecogrow-db
          property: connectionString
      - key: DATABASE_USERNAME
        fromDatabase:
          name: ecogrow-db
          property: user
      - key: DATABASE_PASSWORD
        fromDatabase:
          name: ecogrow-db
          property: password

databases:
  - name: ecogrow-db
    plan: free
