spring.application.name=ecogrow

# ── PostgreSQL (via variáveis de ambiente do Render ou locais com fallback) ──
spring.datasource.url=${JDBC_DATABASE_URL:jdbc:postgresql://localhost:5432/ecogrow}
spring.datasource.username=${JDBC_DATABASE_USERNAME:postgres}
spring.datasource.password=${JDBC_DATABASE_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# ── JPA ────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# ── Porta (injetada automaticamente pelo Render) ───
server.port=${PORT:8080}
